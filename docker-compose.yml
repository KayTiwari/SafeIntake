services:
  backend:
    build: ./backend
    environment:
      - SECRET_KEY=${SECRET_KEY:-dev-only-change-me}
    volumes:
      - safeintake-data:/app/data
    ports:
      - "5001:5001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5001/api/health').status == 200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  safeintake-data:
